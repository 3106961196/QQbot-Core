<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QQBot 管理</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%234a90d9' stroke-width='2'><circle cx='12' cy='12' r='10'/><path d='M8 14s1.5 2 4 2 4-2 4-2'/><circle cx='9' cy='9' r='1' fill='%234a90d9'/><circle cx='15' cy='9' r='1' fill='%234a90d9'/></svg>">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app">
        <header class="header">
            <div class="header-brand">
                <svg class="brand-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z"/>
                    <path d="M8 14s1.5 2 4 2 4-2 4-2"/>
                    <line x1="9" y1="9" x2="9.01" y2="9"/>
                    <line x1="15" y1="9" x2="15.01" y2="9"/>
                </svg>
                <span class="brand-name">QQBot 管理</span>
            </div>
            <div class="header-actions">
                <button class="btn btn-sm btn-secondary" id="settingsBtn" title="设置">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="3"/>
                        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
                    </svg>
                </button>
                <div class="api-key-box">
                    <input type="password" class="api-key-input" id="apiKey" placeholder="API Key">
                    <button class="btn btn-sm btn-primary" id="saveApiKeyBtn">保存</button>
                </div>
                <div class="header-status" id="connectionStatus">
                    <span class="status-dot"></span>
                    <span class="status-text">未连接</span>
                </div>
            </div>
        </header>

        <main class="main">
            <div class="bot-list" id="botList">
                <div class="empty-state" id="emptyState">
                    <svg class="empty-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z"/>
                        <path d="M8 14s1.5 2 4 2 4-2 4-2"/>
                        <line x1="9" y1="9" x2="9.01" y2="9"/>
                        <line x1="15" y1="9" x2="15.01" y2="9"/>
                    </svg>
                    <p class="empty-text">暂无机器人</p>
                    <p class="empty-hint">点击右下角按钮添加 QQ 官方机器人</p>
                </div>
            </div>
        </main>

        <button class="fab" id="fabAdd" title="添加机器人">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="12" y1="5" x2="12" y2="19"/>
                <line x1="5" y1="12" x2="19" y2="12"/>
            </svg>
        </button>
    </div>

    <div class="modal-overlay" id="modalOverlay">
        <div class="modal" id="addModal">
            <div class="modal-header">
                <h2 class="modal-title">添加 QQ 机器人</h2>
                <button class="modal-close" id="modalClose">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="6" x2="6" y2="18"/>
                        <line x1="6" y1="6" x2="18" y2="18"/>
                    </svg>
                </button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label class="form-label" for="appId">AppID</label>
                    <input type="text" class="form-input" id="appId" placeholder="请输入 QQ 开放平台 AppID">
                </div>
                <div class="form-group">
                    <label class="form-label" for="appSecret">AppSecret</label>
                    <input type="password" class="form-input" id="appSecret" placeholder="请输入 QQ 开放平台 AppSecret">
                </div>
                <div class="form-hint">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10"/>
                        <line x1="12" y1="16" x2="12" y2="12"/>
                        <line x1="12" y1="8" x2="12.01" y2="8"/>
                    </svg>
                    <span>请在 QQ 开放平台创建机器人应用获取 AppID 和 AppSecret</span>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" id="btnCancel">取消</button>
                <button class="btn btn-primary" id="btnSubmit">
                    <span class="btn-text">添加并连接</span>
                    <span class="btn-loading" style="display: none;">
                        <svg class="spinner" viewBox="0 0 24 24">
                            <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="3" fill="none" stroke-dasharray="31.416" stroke-dashoffset="10"/>
                        </svg>
                        连接中...
                    </span>
                </button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="settingsOverlay">
        <div class="modal modal-settings" id="settingsModal">
            <div class="modal-header">
                <h2 class="modal-title">设置</h2>
                <button class="modal-close" id="settingsClose">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="6" x2="6" y2="18"/>
                        <line x1="6" y1="6" x2="18" y2="18"/>
                    </svg>
                </button>
            </div>
            <div class="modal-body">
                <div class="settings-section">
                    <h3 class="settings-section-title">全局配置</h3>
                    <div class="form-group">
                        <label class="form-label">
                            <span>URL转二维码</span>
                            <span class="form-label-hint">将URL转换为二维码图片</span>
                        </label>
                        <label class="switch">
                            <input type="checkbox" id="settingToQRCode" checked>
                            <span class="switch-slider"></span>
                        </label>
                    </div>
                    <div class="form-group">
                        <label class="form-label">
                            <span>按钮回调模式</span>
                            <span class="form-label-hint">启用按钮点击回调功能</span>
                        </label>
                        <label class="switch">
                            <input type="checkbox" id="settingToCallback" checked>
                            <span class="switch-slider"></span>
                        </label>
                    </div>
                    <div class="form-group">
                        <label class="form-label">
                            <span>Bot上传资源</span>
                            <span class="form-label-hint">使用Bot上传图片和语音资源</span>
                        </label>
                        <label class="switch">
                            <input type="checkbox" id="settingToBotUpload" checked>
                            <span class="switch-slider"></span>
                        </label>
                    </div>
                    <div class="form-group">
                        <label class="form-label">
                            <span>隐藏频道撤回</span>
                            <span class="form-label-hint">撤回频道消息时是否隐藏</span>
                        </label>
                        <label class="switch">
                            <input type="checkbox" id="settingHideGuildRecall">
                            <span class="switch-slider"></span>
                        </label>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="settingImageLength">
                            <span>图片压缩阈值</span>
                            <span class="form-label-hint">超过此大小(MB)的图片将被压缩</span>
                        </label>
                        <input type="number" class="form-input" id="settingImageLength" value="3" min="0" max="50" step="0.5">
                    </div>
                </div>
                <div class="settings-section">
                    <h3 class="settings-section-title">Bot 基础配置</h3>
                    <div class="form-group">
                        <label class="form-label">
                            <span>沙箱模式</span>
                            <span class="form-label-hint">是否启用沙箱环境</span>
                        </label>
                        <label class="switch">
                            <input type="checkbox" id="settingSandbox">
                            <span class="switch-slider"></span>
                        </label>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="settingMaxRetry">
                            <span>最大重试次数</span>
                            <span class="form-label-hint">连接失败时的最大重试次数</span>
                        </label>
                        <input type="number" class="form-input" id="settingMaxRetry" value="10" min="0" max="100">
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="settingTimeout">
                            <span>请求超时时间</span>
                            <span class="form-label-hint">请求超时时间(毫秒)</span>
                        </label>
                        <input type="number" class="form-input" id="settingTimeout" value="30000" min="1000" step="1000">
                    </div>
                </div>
                <div class="settings-section">
                    <h3 class="settings-section-title">账户默认配置</h3>
                    <div class="form-group">
                        <label class="form-label">
                            <span>Markdown支持</span>
                            <span class="form-label-hint">新账户默认启用Markdown消息格式</span>
                        </label>
                        <label class="switch">
                            <input type="checkbox" id="settingMarkdownSupport">
                            <span class="switch-slider"></span>
                        </label>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" id="settingsCancel">取消</button>
                <button class="btn btn-primary" id="settingsSave">
                    <span class="btn-text">保存设置</span>
                </button>
            </div>
        </div>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script src="app.js"></script>
</body>
</html>
