<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow, noarchive, nosnippet">
    <meta name="googlebot" content="noindex, nofollow">
    <title>QQBot 管理</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%234a90d9' stroke-width='2'><circle cx='12' cy='12' r='10'/><path d='M8 14s1.5 2 4 2 4-2 4-2'/><circle cx='9' cy='9' r='1' fill='%234a90d9'/><circle cx='15' cy='9' r='1' fill='%234a90d9'/></svg>">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app">
        <header class="header">
            <div class="header-brand">
                <svg class="brand-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z"/>
                    <path d="M8 14s1.5 2 4 2 4-2 4-2"/>
                    <line x1="9" y1="9" x2="9.01" y2="9"/>
                    <line x1="15" y1="9" x2="15.01" y2="9"/>
                </svg>
                <span class="brand-name">QQBot 管理</span>
            </div>
            <div class="header-actions">
                <div class="header-status" id="connectionStatus">
                    <span class="status-dot"></span>
                    <span class="status-text">未连接</span>
                </div>
            </div>
        </header>

        <main class="main">
            <div class="bot-list" id="botList">
                <div class="empty-state" id="emptyState">
                    <svg class="empty-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z"/>
                        <path d="M8 14s1.5 2 4 2 4-2 4-2"/>
                        <line x1="9" y1="9" x2="9.01" y2="9"/>
                        <line x1="15" y1="9" x2="15.01" y2="9"/>
                    </svg>
                    <p class="empty-text">暂无机器人</p>
                    <p class="empty-hint">点击右下角 + 按钮添加 QQ 机器人</p>
                </div>
            </div>
        </main>

        <button class="fab" id="fabAdd" title="添加机器人">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="12" y1="5" x2="12" y2="19"/>
                <line x1="5" y1="12" x2="19" y2="12"/>
            </svg>
        </button>
    </div>

    <div class="modal-overlay" id="modalOverlay">
        <div class="modal" id="addModal">
            <div class="modal-header">
                <h2 class="modal-title">添加 QQ 机器人</h2>
                <button class="modal-close" id="modalClose">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="6" x2="6" y2="18"/>
                        <line x1="6" y1="6" x2="18" y2="18"/>
                    </svg>
                </button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label class="form-label" for="appId">AppID</label>
                    <input type="text" class="form-input" id="appId" placeholder="请输入 QQ 开放平台 AppID">
                </div>
                <div class="form-group">
                    <label class="form-label" for="appSecret">AppSecret</label>
                    <input type="password" class="form-input" id="appSecret" placeholder="请输入 QQ 开放平台 AppSecret">
                </div>
                <div class="form-hint">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10"/>
                        <line x1="12" y1="16" x2="12" y2="12"/>
                        <line x1="12" y1="8" x2="12.01" y2="8"/>
                    </svg>
                    <span>请在 QQ 开放平台创建机器人应用获取 AppID 和 AppSecret</span>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" id="btnCancel">取消</button>
                <button class="btn btn-primary" id="btnSubmit">
                    <span class="btn-text">添加并连接</span>
                    <span class="btn-loading" style="display: none;">
                        <svg class="spinner" viewBox="0 0 24 24">
                            <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="3" fill="none" stroke-dasharray="31.416" stroke-dashoffset="10"/>
                        </svg>
                        连接中...
                    </span>
                </button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="botSettingsOverlay">
        <div class="modal modal-lg">
            <div class="modal-header">
                <h2 class="modal-title">机器人设置</h2>
                <button class="modal-close" id="botSettingsClose">&times;</button>
            </div>
            <div class="modal-body">
                <div class="settings-section">
                    <h3 class="settings-section-title">基本信息</h3>
                    <div class="bot-info-display">
                        <div class="bot-info-row">
                            <span class="bot-info-label">机器人名称</span>
                            <span class="bot-info-value" id="botSettingName">-</span>
                        </div>
                        <div class="bot-info-row">
                            <span class="bot-info-label">AppID</span>
                            <span class="bot-info-value" id="botSettingAppId">-</span>
                        </div>
                        <div class="bot-info-row">
                            <span class="bot-info-label">状态</span>
                            <span class="bot-info-value" id="botSettingStatus">-</span>
                        </div>
                    </div>
                </div>
                <div class="settings-section">
                    <h3 class="settings-section-title">主人管理</h3>
                    <div class="master-list" id="masterList">
                        <p class="empty-hint">暂无主人</p>
                    </div>
                    <div class="form-group" style="margin-top: 12px;">
                        <div class="master-input-row">
                            <input type="text" class="form-input" id="newMasterId" placeholder="输入QQ号或user_id">
                            <button class="btn btn-primary btn-sm" id="addMasterBtn">添加</button>
                        </div>
                    </div>
                </div>
                <div class="settings-section">
                    <h3 class="settings-section-title">Bot配置</h3>
                    <div class="form-group">
                        <label class="form-label">
                            <span>自动连接</span>
                            <span class="form-label-hint">框架启动时自动连接机器人</span>
                        </label>
                        <label class="switch">
                            <input type="checkbox" id="botSettingAutoConnect" checked>
                            <span class="switch-slider"></span>
                        </label>
                    </div>
                    <div class="form-group">
                        <label class="form-label">
                            <span>沙箱模式</span>
                            <span class="form-label-hint">是否启用沙箱环境</span>
                        </label>
                        <label class="switch">
                            <input type="checkbox" id="botSettingSandbox">
                            <span class="switch-slider"></span>
                        </label>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="botSettingMaxRetry">
                            <span>最大重试次数</span>
                            <span class="form-label-hint">连接失败时的最大重试次数</span>
                        </label>
                        <input type="number" class="form-input" id="botSettingMaxRetry" value="10" min="0" max="100">
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="botSettingTimeout">
                            <span>API请求超时</span>
                            <span class="form-label-hint">调用QQ官方API的超时时间(秒)</span>
                        </label>
                        <input type="number" class="form-input" id="botSettingTimeout" value="30" min="1" max="300">
                    </div>
                    <div class="form-group">
                        <label class="form-label">
                            <span>Markdown支持</span>
                            <span class="form-label-hint">是否启用Markdown消息格式</span>
                        </label>
                        <label class="switch">
                            <input type="checkbox" id="botSettingMarkdown">
                            <span class="switch-slider"></span>
                        </label>
                    </div>
                    <div class="form-group">
                        <label class="form-label">
                            <span>URL转二维码</span>
                            <span class="form-label-hint">将URL转换为二维码图片</span>
                        </label>
                        <label class="switch">
                            <input type="checkbox" id="botSettingToQRCode">
                            <span class="switch-slider"></span>
                        </label>
                    </div>
                    <div class="form-group">
                        <label class="form-label">
                            <span>按钮回调模式</span>
                            <span class="form-label-hint">启用按钮点击回调功能</span>
                        </label>
                        <label class="switch">
                            <input type="checkbox" id="botSettingToCallback">
                            <span class="switch-slider"></span>
                        </label>
                    </div>
                    <div class="form-group">
                        <label class="form-label">
                            <span>Bot上传资源</span>
                            <span class="form-label-hint">使用Bot上传图片和语音资源</span>
                        </label>
                        <label class="switch">
                            <input type="checkbox" id="botSettingToBotUpload">
                            <span class="switch-slider"></span>
                        </label>
                    </div>
                    <div class="form-group">
                        <label class="form-label">
                            <span>隐藏频道撤回</span>
                            <span class="form-label-hint">撤回频道消息时是否隐藏</span>
                        </label>
                        <label class="switch">
                            <input type="checkbox" id="botSettingHideGuildRecall">
                            <span class="switch-slider"></span>
                        </label>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="botSettingImageLength">
                            <span>图片压缩阈值</span>
                            <span class="form-label-hint">超过此大小(MB)的图片将被压缩</span>
                        </label>
                        <input type="number" class="form-input" id="botSettingImageLength" value="3" min="0" max="50" step="0.5">
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" id="botSettingsCancel">取消</button>
                <button class="btn btn-primary" id="botSettingsSave">
                    <span class="btn-text">保存设置</span>
                </button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="tempKeyLoginOverlay">
        <div class="modal modal-sm">
            <div class="modal-header">
                <h2 class="modal-title">QQBot 管理登录</h2>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label class="form-label" for="tempKeyInput">临时Key</label>
                    <input type="text" class="form-input" id="tempKeyInput" placeholder="请输入临时Key">
                </div>
                <div class="form-hint" style="margin-top: 8px;">
                    <span>没有临时Key？</span>
                    <button class="btn btn-link" id="generateTempKeyBtn">点击获取</button>
                </div>
                <div class="temp-key-tip" id="tempKeyTip" style="display: none; margin-top: 12px;">
                    <p>临时Key已生成，请查看后台日志获取</p>
                    <p class="temp-key-tip-sub">有效期5分钟</p>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-primary" id="tempKeyLoginSubmit" style="width: 100%;">
                    <span class="btn-text">登录</span>
                </button>
            </div>
        </div>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script src="app.js"></script>
</body>
</html>
